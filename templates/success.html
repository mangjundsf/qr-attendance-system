<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>출석 완료</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body class="student-page success-page">
    <div class="container">
        <div class="success-card">
            <div class="check-animation">
                <div class="check-circle">
                    <i class="bi bi-check-lg"></i>
                </div>
            </div>
            <h1 class="success-title">출석이 완료되었습니다.</h1>

            <div class="success-info">
                <div class="info-row">
                    <span class="label">이름</span>
                    <span class="value">{{ record.student_name }}</span>
                </div>
                <div class="info-row">
                    <span class="label">학번</span>
                    <span class="value">{{ record.student_id }}</span>
                </div>
                <div class="info-row">
                    <span class="label">출석 시간</span>
                    <span class="value">{{ record.time.strftime('%H:%M:%S') }}</span>
                </div>
                <div class="info-row">
                    <span class="label">세션</span>
                    <span class="value">{{ record.session or '-' }}</span>
                </div>
                <div class="info-row">
                    <span class="label">상태</span>
                    <span class="value">
                        {% if record.status == '출석' %}
                            <span class="badge bg-success">{{ record.status }}</span>
                        {% else %}
                            <span class="badge bg-warning text-dark">{{ record.status }}</span>
                        {% endif %}
                    </span>
                </div>
            </div>

            <a href="{{ url_for('index') }}" class="btn btn-primary btn-lg w-100 mt-4">
                <i class="bi bi-house"></i> 처음으로
            </a>
        </div>
    </div>
</body>
</html>
