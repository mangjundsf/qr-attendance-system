<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스마트 출석 체크</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body class="student-page">
    <div class="container">
        <div class="attendance-card">
            <div class="text-center mb-4">
                <div class="logo-icon">
                    <i class="bi bi-qr-code-scan"></i>
                </div>
                <h1 class="title">스마트 출석 체크</h1>
                <p class="subtitle">학번과 이름을 입력하고 출석해주세요</p>
            </div>

            <!-- 오늘 출석 현황 -->
            <div class="today-stats mb-4">
                <div class="stat-item">
                    <i class="bi bi-people-fill"></i>
                    <span>오늘 출석: <strong>{{ stats.attended_today }}</strong> / {{ stats.total }}명</span>
                </div>
            </div>

            <form id="attendanceForm">
                <div class="mb-3">
                    <label for="student_id" class="form-label">
                        <i class="bi bi-person-badge"></i> 학번
                    </label>
                    <input type="text" class="form-control form-control-lg" id="student_id"
                           placeholder="학번을 입력하세요" required autocomplete="off">
                </div>
                <div class="mb-4">
                    <label for="name" class="form-label">
                        <i class="bi bi-person"></i> 이름
                    </label>
                    <input type="text" class="form-control form-control-lg" id="name"
                           placeholder="이름을 입력하세요" required autocomplete="off">
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100" id="submitBtn">
                    <i class="bi bi-geo-alt-fill"></i> 출석하기
                </button>
            </form>

            <div id="errorAlert" class="alert alert-danger mt-3 d-none" role="alert"></div>

            <div class="text-center mt-4">
                <a href="{{ url_for('admin_login') }}" class="admin-link">
                    <i class="bi bi-shield-lock"></i> 관리자 로그인
                </a>
            </div>
        </div>
    </div>

    <!-- 확인 팝업 -->
    <div class="modal fade" id="confirmModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="bi bi-question-circle"></i> 출석 확인</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body text-center">
                    <p class="mb-1">다음 정보로 출석하시겠습니까?</p>
                    <p class="fw-bold" id="confirmInfo"></p>
                    <p class="text-muted small">GPS 위치 확인이 필요합니다.</p>
                </div>
                <div class="modal-footer justify-content-center">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
                    <button type="button" class="btn btn-primary" id="confirmBtn">출석 확인</button>
                </div>
            </div>
        </div>
    </div>

    <!-- GPS 로딩 -->
    <div class="loading-overlay d-none" id="loadingOverlay">
        <div class="loading-content">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-3">GPS 위치 확인 중...</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/attendance.js') }}"></script>
</body>
</html>
